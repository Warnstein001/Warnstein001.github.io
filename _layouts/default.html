<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>{{ page.title }}</title>

<style>
body {
    font-family: monospace;
    margin: 0;
    padding: 0;
}
.container {
    display: flex;
    height: 100vh;
}
.nav {
    width: 220px;
    padding: 20px;
    border-right: 1px solid #ddd;
    overflow-y: auto;
}
.content {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}
a { color: black; text-decoration: none; }
a:hover { text-decoration: underline; }
img.avatar {
    width: 100px;
    border-radius: 50%;
}
</style>

</head>
<body>
<div class="container">

    <!-- Left Navigation -->
    <div class="nav">
        <img src="/assets/avatar.jpg" class="avatar"><br>
        <b>{{ site.title }}</b><br><br>

        <a href="/">首页</a><br>
        <a href="/about">关于</a><br>
        <br>
        <b>Wiki</b><br>
        <a href="/wiki/intro">简介</a><br>
        <a href="/wiki/example">示例页面</a><br>
    </div>

    <!-- Content -->
    <div class="content">
        {{ content }}
    </div>

</div>
</body>
</html>
